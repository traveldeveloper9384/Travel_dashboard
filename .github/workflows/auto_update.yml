name: Realtime Travel Dashboard Auto Update

on:
  schedule:
    # 매일 한국 시간(KST) 오전 9시부터 오후 6시까지 매 시간 정각마다 자동 실행 (주말 제외 평일만)
    - cron: '0 0-9 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4
      with:
        # 최신 내부 런타임 호환성을 위해 체크아웃 옵션 유지

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 환율 크롤링 및 index.html 업데이트 실행
      run: |
        python update_dashboard.py

    - name: 변경된 index.html을 GitHub 저장소에 다시 반영 (Push)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 실시간 환율 자동 업데이트 완료" && git push)
