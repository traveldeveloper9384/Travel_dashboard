name: Realtime Travel Dashboard Auto Update

on:
  schedule:
    # 24시간 동안 매 30분마다 (0분, 30분) 자동으로 실행되도록 설정
    - cron: '0,30 * * * *'
  workflow_dispatch: # 언제든 수동으로 즉시 실행할 수 있는 버튼 활성화

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 환율 크롤링 및 index.html 업데이트 실행
      run: |
        python update_dashboard.py

    - name: 변경된 index.html을 GitHub 저장소에 다시 반영 (Push)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 실시간 환율 자동 업데이트 완료" && git push)
